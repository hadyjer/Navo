    <script>
document.addEventListener("DOMContentLoaded", function () {

    // MOBILE MENU
    const menuToggle = document.querySelector(".menu-toggle");
    const navLinks = document.querySelector(".nav-links");

    menuToggle.addEventListener("click", () => {
        navLinks.classList.toggle("active");
    });

    // FORM
    const form = document.getElementById("contact-form");

    form.addEventListener("submit", function (e) {
        e.preventDefault();

        // GET VALUES
        const name = form.querySelector('input[name="name"]').value;
        const phone = form.querySelector('input[name="phone"]').value;
        const email = form.querySelector('input[name="email"]').value;
        const service = form.querySelector('select[name="service"]').value;
        const message = form.querySelector('textarea[name="message"]').value;

        // WHATSAPP MESSAGE
        const whatsappMessage =
`Hello NAVO, I would like to request a driver.

Name: ${name}
Phone: ${phone}
Email: ${email}
Service: ${service}
Pickup Details: ${message}`;

        // OPEN WHATSAPP
        window.open(
            `https://wa.me/256753492143?text=${encodeURIComponent(whatsappMessage)}`,
            "_blank"
        );

        // OPTIONAL: SUBMIT TO FORMSPREE AFTER
        form.submit();
    });

});
</script>
